name: E2E testy

# Spúšťa Playwright E2E pri každom PR do main aj pri manuálnom spustení.
# Cieľ: dať auto-fix agentovi (a človeku-recenzentovi) tvrdú spätnú väzbu,
# že oprava nerozbila prechod dotazníkom ani export.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-e2e') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Inštalácia závislostí
        run: npm ci

      - name: Inštalácia Playwright prehliadača
        run: npx playwright install --with-deps chromium

      - name: Spustenie E2E
        run: npx playwright test

      - name: Upload reportu (pri zlyhaní)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
